services:
  - type: web
    name: medlink-backend
    runtime: node
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: npm install --include=dev && npm run build
    startCommand: node dist/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: DB_PATH
        value: ./data/medlink.db
      - key: MAX_CONCURRENT_SESSIONS
        value: 50
      - key: SESSION_RESUME_WINDOW_MINUTES
        value: 30
      - key: SESSION_EXPIRE_HOURS
        value: 24
      - key: CORS_ORIGIN
        sync: false
